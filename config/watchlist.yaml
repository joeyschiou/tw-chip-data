# ============================================================
# 追蹤股清單 — fetch 腳本每次執行時讀這個檔
# ============================================================
# 維護方式:
#   - 要開始追一檔:在 tickers 底下加一行
#   - 不追了:刪掉那行(歷史 CSV 會留著,不會被刪)
#   - 手機也能改:GitHub App / 網頁版直接編輯這個檔 → commit
#
# 欄位說明:
#   id       股票代號(字串,保留前導零,如 "0050")
#   market   twse=上市 / tpex=上櫃(6xxx/7xxx 多為 tpex)
#            —— 決定去證交所還是櫃買抓,別填錯
#   note     給你自己看的備註,腳本不使用
# ============================================================

# 每日全市場分點是否下載(存量視角的來源,沒抓就永遠補不回來)
# true  = 嘗試 storage_objects 批次下載整日全市場(1 次額度)
#         若免費層不支援,腳本自動退回只抓下方 tickers
# false = 只抓下方 tickers 的分點
fetch_full_market_branch: true

